name: Conda Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-conda:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        channels: conda-forge,defaults
        channel-priority: strict
        activate-environment: isaforge-test
        auto-activate-base: false

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install -y pip
        pip install -e ".[dev]"

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest tests/ -v --cov=src/isaforge --cov-report=xml --cov-report=html --cov-report=term-missing --junitxml=test-results-conda.xml

    - name: Upload coverage report as artifact
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-conda
        path: htmlcov/
        retention-days: 30

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: conda-test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: test-results-conda.xml
        retention-days: 30
